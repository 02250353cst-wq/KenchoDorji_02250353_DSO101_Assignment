name: Build, Push & Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build & Push Backend Image
      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/be-todo:02250353 ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/be-todo:02250353

      # 4. Build & Push Frontend Image
      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fe-todo:02250353 ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fe-todo:02250353

      # 5. Trigger Backend Redeployment on Render
      - name: Deploy Backend to Render
        run: |
          curl -X POST ${{ secrets.RENDER_BACKEND_WEBHOOK }}

      # 6. Trigger Frontend Redeployment on Render
      - name: Deploy Frontend to Render
        run: |
          curl -X POST ${{ secrets.RENDER_FRONTEND_WEBHOOK }}