<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['Outfit', 'sans-serif'],
          },
          colors: {
            glass: 'rgba(255,255,255,0.04)',
            'glass-hover': 'rgba(255,255,255,0.07)',
            accent: '#7c6dfa',
            'accent-pink': '#f06292',
            'accent-teal': '#4dd9ac',
            high: '#ff6b8a',
            med: '#f6c94e',
            low: '#4dd9ac',
          },
          backgroundImage: {
            'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
          },
          boxShadow: {
            'glow-purple': '0 0 0 3px rgba(124,109,250,0.2)',
            'glow-btn': '0 4px 24px rgba(124,109,250,0.4)',
            'glow-btn-hover': '0 8px 32px rgba(124,109,250,0.5)',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: 0, transform: 'translateY(20px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
            slideIn: {
              '0%': { opacity: 0, transform: 'translateY(-10px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
            scaleIn: {
              '0%': { opacity: 0, transform: 'scale(0.94)' },
              '100%': { opacity: 1, transform: 'scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            toastIn: {
              '0%': { opacity: 0, transform: 'translateX(-50%) translateY(20px)' },
              '100%': { opacity: 1, transform: 'translateX(-50%) translateY(0)' },
            },
          },
          animation: {
            fadeUp: 'fadeUp 0.6s ease both',
            'fadeUp-1': 'fadeUp 0.6s 0.1s ease both',
            'fadeUp-2': 'fadeUp 0.6s 0.2s ease both',
            'fadeUp-3': 'fadeUp 0.6s 0.3s ease both',
            'fadeUp-4': 'fadeUp 0.6s 0.35s ease both',
            slideIn: 'slideIn 0.3s ease both',
            scaleIn: 'scaleIn 0.25s ease both',
            float: 'float 3s ease-in-out infinite',
            toastIn: 'toastIn 0.3s ease both',
          },
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Outfit', sans-serif; background: #0d0d1a; }

    .bg-scene::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,109,250,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(240,98,146,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 60% 10%, rgba(77,217,172,0.08) 0%, transparent 60%);
    }

    .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); }
    .glass-hover:hover { background: rgba(255,255,255,0.07); }

    /* Gradient text */
    .text-gradient-white {
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .text-gradient-accent {
      background: linear-gradient(135deg, #7c6dfa 0%, #f06292 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* Inputs */
    .task-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      color: #f0eff8;
      font-family: 'Outfit', sans-serif;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .task-input:focus {
      outline: none;
      border-color: #7c6dfa;
      background: rgba(124,109,250,0.08);
      box-shadow: 0 0 0 3px rgba(124,109,250,0.15);
    }
    .task-input::placeholder { color: rgba(240,239,248,0.2); }
    select option { background: #1a1a2e; }

    /* Stat top border */
    .stat-purple::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:#7c6dfa; border-radius:2px 2px 0 0; }
    .stat-teal::before   { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:#4dd9ac; border-radius:2px 2px 0 0; }
    .stat-pink::before   { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:#f06292; border-radius:2px 2px 0 0; }

    /* Task left border priority */
    .task-high::before   { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:#ff6b8a; border-radius:3px 0 0 3px; }
    .task-medium::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:#f6c94e; border-radius:3px 0 0 3px; }
    .task-low::before    { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:#4dd9ac; border-radius:3px 0 0 3px; }

    /* Checkbox */
    .custom-cb { display: none; }
    .cb-box {
      width: 24px; height: 24px; border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; cursor: pointer; flex-shrink: 0;
    }
    .cb-box svg { opacity: 0; transition: opacity 0.15s; }
    .custom-cb:checked + .cb-box {
      background: linear-gradient(135deg, #4dd9ac, #2ec4a0);
      border-color: transparent;
      box-shadow: 0 2px 12px rgba(77,217,172,0.4);
    }
    .custom-cb:checked + .cb-box svg { opacity: 1; }

    /* Action buttons */
    .action-btn {
      width: 32px; height: 32px; border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s; font-size: 13px; color: rgba(240,239,248,0.4);
    }
    .action-btn.edit:hover { border-color: #7c6dfa; color: #7c6dfa; background: rgba(124,109,250,0.12); }
    .action-btn.del:hover  { border-color: #ff6b8a; color: #ff6b8a; background: rgba(255,107,138,0.12); }

    .task-actions { opacity: 0; transition: opacity 0.2s; }
    .task-item:hover .task-actions { opacity: 1; }

    /* Progress bar */
    .progress-fill { transition: width 0.5s ease; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1e38; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px; padding: 12px 24px;
      font-size: 13px; font-weight: 500; color: #f0eff8;
      z-index: 200; transition: transform 0.3s ease; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(255,107,138,0.3); color: #ff6b8a; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }

    /* Modal overlay */
    .modal-overlay { display: none; }
    .modal-overlay.open { display: flex; }
  </style>
</head>
<body class="bg-scene min-h-screen text-[#f0eff8] overflow-x-hidden">

<div class="relative z-10 max-w-2xl mx-auto px-5 py-12 pb-24">

  <!-- Header -->
  <header class="mb-11 animate-fadeUp">
    <div class="flex items-center gap-2 mb-3">
      <div class="flex gap-1.5">
        <span class="w-2 h-2 rounded-full bg-accent"></span>
        <span class="w-2 h-2 rounded-full bg-accent-pink"></span>
        <span class="w-2 h-2 rounded-full bg-accent-teal"></span>
      </div>
      <span class="text-[10px] font-semibold tracking-[0.18em] uppercase text-white/40">TaskFlow &mdash; Stay in control</span>
    </div>
    <h1 class="font-display text-5xl md:text-6xl font-black leading-[1.05]">
      <span class="text-gradient-white">Your Tasks,</span><br/>
      <span class="text-gradient-accent">Beautifully Done.</span>
    </h1>
    <p class="mt-3 text-[15px] text-white/40 font-light">Organize everything, miss nothing.</p>
  </header>

  <!-- Stats -->
  <div class="grid grid-cols-3 gap-3 mb-5 animate-fadeUp-1">
    <div class="glass rounded-xl p-5 relative overflow-hidden stat-purple hover:-translate-y-0.5 transition-transform">
      <div class="text-[10px] font-semibold tracking-[0.15em] uppercase text-white/40 mb-1.5">Total</div>
      <div class="font-display text-4xl font-bold text-accent" id="stat-total">0</div>
    </div>
    <div class="glass rounded-xl p-5 relative overflow-hidden stat-teal hover:-translate-y-0.5 transition-transform">
      <div class="text-[10px] font-semibold tracking-[0.15em] uppercase text-white/40 mb-1.5">Completed</div>
      <div class="font-display text-4xl font-bold text-accent-teal" id="stat-done">0</div>
    </div>
    <div class="glass rounded-xl p-5 relative overflow-hidden stat-pink hover:-translate-y-0.5 transition-transform">
      <div class="text-[10px] font-semibold tracking-[0.15em] uppercase text-white/40 mb-1.5">Remaining</div>
      <div class="font-display text-4xl font-bold text-accent-pink" id="stat-pending">0</div>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="mb-7 animate-fadeUp-1">
    <div class="flex justify-between text-xs text-white/40 mb-2">
      <span>Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="h-1.5 rounded-full bg-white/[0.07] overflow-hidden">
      <div id="progress-fill" class="progress-fill h-full rounded-full bg-gradient-to-r from-accent-teal to-accent" style="width:0%"></div>
    </div>
  </div>

  <!-- Add Task Card -->
  <div class="glass rounded-2xl p-6 mb-6 animate-fadeUp-2 backdrop-blur-xl">
    <p class="text-[10px] font-semibold tracking-[0.15em] uppercase text-white/40 mb-4">✦ New Task</p>

    <!-- Title input -->
    <div class="relative mb-3">
      <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm opacity-50 pointer-events-none">✏️</span>
      <input type="text" id="task-input" placeholder="What needs to be done?"
        class="task-input w-full rounded-xl py-3 pl-9 pr-4 text-sm"/>
    </div>

    <!-- Priority + Due date -->
    <div class="flex gap-3 mb-4">
      <div class="relative flex-1">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm opacity-50 pointer-events-none">🎯</span>
        <select id="priority-select" class="task-input w-full rounded-xl py-3 pl-9 pr-4 text-sm appearance-none cursor-pointer">
          <option value="low">Low Priority</option>
          <option value="medium" selected>Medium Priority</option>
          <option value="high">High Priority</option>
        </select>
      </div>
      <div class="relative flex-1">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm opacity-50 pointer-events-none">📅</span>
        <input type="date" id="due-date" class="task-input w-full rounded-xl py-3 pl-9 pr-4 text-sm"/>
      </div>
    </div>

    <!-- Add button -->
    <button onclick="addTask()"
      class="w-full py-3.5 rounded-xl font-semibold text-[15px] text-white tracking-wide
             bg-gradient-to-br from-accent to-purple-500
             shadow-glow-btn hover:shadow-glow-btn-hover
             hover:-translate-y-0.5 active:scale-[0.98]
             transition-all duration-200">
      + Add Task
    </button>
  </div>

  <!-- Filter Tabs -->
  <div class="flex gap-2 mb-5 animate-fadeUp-3">
    <button class="filter-btn px-5 py-2 rounded-full text-[13px] font-medium border border-white/[0.09] bg-white/[0.04] text-white/50 transition-all hover:text-white hover:border-white/20 active"
      onclick="setFilter('all', this)">All Tasks</button>
    <button class="filter-btn px-5 py-2 rounded-full text-[13px] font-medium border border-white/[0.09] bg-white/[0.04] text-white/50 transition-all hover:text-white hover:border-white/20"
      onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn px-5 py-2 rounded-full text-[13px] font-medium border border-white/[0.09] bg-white/[0.04] text-white/50 transition-all hover:text-white hover:border-white/20"
      onclick="setFilter('done', this)">Completed</button>
  </div>

  <!-- Task List -->
  <div id="task-list" class="animate-fadeUp-4"></div>

  <!-- Empty State -->
  <div id="empty" class="hidden text-center py-16">
    <span class="text-5xl block mb-4 animate-float">🌿</span>
    <h3 class="font-display text-xl mb-2">All clear here!</h3>
    <p class="text-white/40 text-sm font-light">Add a task above to get started on something great.</p>
  </div>

</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal-overlay fixed inset-0 z-50 items-center justify-center p-5"
  style="background:rgba(0,0,0,0.65); backdrop-filter:blur(8px);">
  <div class="bg-[#16162a] border border-white/10 rounded-2xl p-8 w-full max-w-md animate-scaleIn">
    <h2 class="font-display text-xl mb-5">Edit Task</h2>
    <div class="flex flex-col gap-3">
      <div class="relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm opacity-50 pointer-events-none">✏️</span>
        <input type="text" id="edit-input" placeholder="Task title"
          class="task-input w-full rounded-xl py-3 pl-9 pr-4 text-sm"/>
      </div>
      <div class="relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm opacity-50 pointer-events-none">🎯</span>
        <select id="edit-priority" class="task-input w-full rounded-xl py-3 pl-9 pr-4 text-sm appearance-none cursor-pointer">
          <option value="low">Low Priority</option>
          <option value="medium">Medium Priority</option>
          <option value="high">High Priority</option>
        </select>
      </div>
      <div class="relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm opacity-50 pointer-events-none">📅</span>
        <input type="date" id="edit-due" class="task-input w-full rounded-xl py-3 pl-9 pr-4 text-sm"/>
      </div>
    </div>
    <div class="flex gap-3 mt-6">
      <button onclick="saveEdit()"
        class="flex-1 py-3 rounded-xl font-semibold text-sm text-white
               bg-gradient-to-br from-accent to-purple-500 hover:opacity-90 transition-opacity">
        Save Changes
      </button>
      <button onclick="closeModal()"
        class="flex-1 py-3 rounded-xl text-sm font-medium text-white/50
               border border-white/10 hover:text-white hover:border-white/20 transition-all">
        Cancel
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API_URL = window.API_URL || 'http://localhost:5000';
  let tasks = [];
  let filter = 'all';
  let editingId = null;

  // Active filter style
  const ACTIVE_FILTER = 'bg-gradient-to-br from-accent to-purple-500 border-transparent text-white shadow-[0_2px_16px_rgba(124,109,250,0.3)]';
  const INACTIVE_FILTER = 'bg-white/[0.04] border-white/[0.09] text-white/50';

  async function fetchTasks() {
    try {
      const res = await fetch(`${API_URL}/tasks`);
      tasks = await res.json();
      render();
    } catch(e) {
      showToast('Could not connect to server.', true);
    }
  }

  async function addTask() {
    const title = document.getElementById('task-input').value.trim();
    const priority = document.getElementById('priority-select').value;
    const due_date = document.getElementById('due-date').value;
    if (!title) { showToast('Please enter a task title.', true); return; }
    try {
      await fetch(`${API_URL}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, priority, due_date: due_date || null })
      });
      document.getElementById('task-input').value = '';
      document.getElementById('due-date').value = '';
      showToast('Task added!');
      fetchTasks();
    } catch(e) { showToast('Failed to add task.', true); }
  }

  async function toggleTask(id) {
    const task = tasks.find(t => t.id == id);
    try {
      await fetch(`${API_URL}/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...task, completed: !task.completed })
      });
      fetchTasks();
    } catch(e) { showToast('Failed to update.', true); }
  }

  async function deleteTask(id) {
    try {
      await fetch(`${API_URL}/tasks/${id}`, { method: 'DELETE' });
      showToast('Task deleted.');
      fetchTasks();
    } catch(e) { showToast('Failed to delete.', true); }
  }

  function openEdit(id) {
    const task = tasks.find(t => t.id == id);
    editingId = id;
    document.getElementById('edit-input').value = task.title;
    document.getElementById('edit-priority').value = task.priority || 'medium';
    document.getElementById('edit-due').value = task.due_date ? task.due_date.split('T')[0] : '';
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
    editingId = null;
  }

  async function saveEdit() {
    const title = document.getElementById('edit-input').value.trim();
    const priority = document.getElementById('edit-priority').value;
    const due_date = document.getElementById('edit-due').value;
    const task = tasks.find(t => t.id == editingId);
    if (!title) return;
    try {
      await fetch(`${API_URL}/tasks/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...task, title, priority, due_date: due_date || null })
      });
      closeModal();
      showToast('Task updated!');
      fetchTasks();
    } catch(e) { showToast('Failed to save.', true); }
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = b.className.replace(ACTIVE_FILTER, '').trim();
      b.classList.add(...INACTIVE_FILTER.split(' '));
    });
    btn.className = btn.className.replace(INACTIVE_FILTER, '').trim();
    btn.classList.add(...ACTIVE_FILTER.split(' '));
    render();
  }

  let toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function formatDate(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  const BADGE = {
    high:   'bg-[rgba(255,107,138,0.15)] text-[#ff6b8a] border border-[rgba(255,107,138,0.25)]',
    medium: 'bg-[rgba(246,201,78,0.12)] text-[#f6c94e] border border-[rgba(246,201,78,0.25)]',
    low:    'bg-[rgba(77,217,172,0.12)] text-[#4dd9ac] border border-[rgba(77,217,172,0.25)]',
  };

  function render() {
    const filtered = tasks.filter(t => {
      if (filter === 'done') return t.completed;
      if (filter === 'pending') return !t.completed;
      return true;
    });

    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-pending').textContent = total - done;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-pct').textContent = pct + '%';

    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty');

    if (filtered.length === 0) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    list.innerHTML = filtered.map(task => {
      const pri = task.priority || 'medium';
      const dueStr = task.due_date
        ? `<span class="flex items-center gap-1 text-[11px] text-white/40">📅 ${formatDate(task.due_date)}</span>`
        : '';
      const strikeClass = task.completed ? 'line-through opacity-50' : '';
      return `
        <div class="task-item task-${pri} glass glass-hover rounded-2xl px-5 py-4
                    flex items-center gap-3.5 mb-2.5
                    relative overflow-hidden
                    hover:translate-x-1 hover:border-white/[0.14] hover:shadow-lg
                    transition-all duration-200 animate-slideIn">
          <label class="cursor-pointer flex-shrink-0">
            <input class="custom-cb" type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})"/>
            <div class="cb-box">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </label>

          <div class="flex-1 min-w-0">
            <p class="text-[15px] font-medium truncate mb-1.5 text-[#f0eff8] ${strikeClass}">${task.title}</p>
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-[10px] font-semibold tracking-[0.1em] uppercase px-2.5 py-0.5 rounded-full ${BADGE[pri]}">${pri}</span>
              ${dueStr}
            </div>
          </div>

          <div class="task-actions flex gap-1.5">
            <button class="action-btn edit" onclick="openEdit(${task.id})" title="Edit">✏️</button>
            <button class="action-btn del" onclick="deleteTask(${task.id})" title="Delete">🗑</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // Enter to add task
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // Close modal on backdrop click
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Init filter button styles
  document.querySelector('.filter-btn.active').classList.add(...'bg-gradient-to-br from-accent to-purple-500 border-transparent text-white'.split(' '));

  fetchTasks();
</script>
</body>
</html>
