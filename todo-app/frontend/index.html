<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['Outfit', 'sans-serif'],
          },
          colors: {
            glass: 'rgba(255,255,255,0.04)',
            'glass-hover': 'rgba(255,255,255,0.07)',
            accent: '#7c6dfa',
            'accent-pink': '#f06292',
            'accent-teal': '#4dd9ac',
            high: '#ff6b8a',
            med: '#f6c94e',
            low: '#4dd9ac',
          },
          animation: {
            fadeUp: 'fadeUp 0.6s ease both',
            slideIn: 'slideIn 0.3s ease both',
            scaleIn: 'scaleIn 0.25s ease both',
            float: 'float 3s ease-in-out infinite',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: 0, transform: 'translateY(20px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
            slideIn: {
              '0%': { opacity: 0, transform: 'translateY(-10px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
            scaleIn: {
              '0%': { opacity: 0, transform: 'scale(0.94)' },
              '100%': { opacity: 1, transform: 'scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Outfit', sans-serif; background: #0d0d1a; color: #f0eff8; }
    .bg-scene::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: 
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,109,250,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(240,98,146,0.12) 0%, transparent 70%);
    }
    .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); backdrop-filter: blur(10px); }
    .text-gradient-accent {
      background: linear-gradient(135deg, #7c6dfa 0%, #f06292 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .task-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); color: white; }
    .task-input:focus { outline: none; border-color: #7c6dfa; box-shadow: 0 0 0 3px rgba(124,109,250,0.15); }
    .custom-cb { display: none; }
    .cb-box { width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .custom-cb:checked + .cb-box { background: #4dd9ac; border-color: #4dd9ac; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); transition: 0.3s; padding: 12px 24px; border-radius: 50px; background: #1e1e38; z-index: 1000; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .task-high { border-left: 4px solid #ff6b8a; }
    .task-medium { border-left: 4px solid #f6c94e; }
    .task-low { border-left: 4px solid #4dd9ac; }
  </style>
</head>
<body class="bg-scene min-h-screen overflow-x-hidden">

<div class="relative z-10 max-w-2xl mx-auto px-5 py-12">
  <header class="mb-10 animate-fadeUp">
    <h1 class="font-display text-5xl font-black mb-2">
      <span class="text-white">Your Tasks,</span><br/>
      <span class="text-gradient-accent">Beautifully Done.</span>
    </h1>
    <p class="text-white/40">Organize everything, miss nothing.</p>
  </header>

  <div class="glass rounded-2xl p-6 mb-8 animate-fadeUp">
    <input type="text" id="task-input" placeholder="What needs to be done?" class="task-input w-full rounded-xl py-3 px-4 mb-3 text-sm"/>
    <div class="flex gap-3 mb-4">
        <select id="priority-select" class="task-input flex-1 rounded-xl py-3 px-4 text-sm">
            <option value="low">Low Priority</option>
            <option value="medium" selected>Medium Priority</option>
            <option value="high">High Priority</option>
        </select>
        <input type="date" id="due-date" class="task-input flex-1 rounded-xl py-3 px-4 text-sm"/>
    </div>
    <button onclick="addTask()" class="w-full py-3.5 rounded-xl font-bold bg-gradient-to-r from-accent to-purple-600 hover:opacity-90 transition-all">
      + Add Task
    </button>
  </div>

  <div id="task-list" class="space-y-3"></div>
  
  <div id="empty" class="hidden text-center py-20">
    <p class="text-white/30 italic">No tasks found. Relax or add a new one!</p>
  </div>
</div>

<div id="toast" class="toast border border-white/10 text-sm"></div>

<script>
  // --- CONFIGURATION ---
  // Replace the URL below with your actual Render Backend URL
  const RENDER_BACKEND_URL = 'https://be-todo-02250353-1.onrender.com';
  
  const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:10000' 
    : RENDER_BACKEND_URL;

  let tasks = [];

  async function fetchTasks() {
    try {
      const res = await fetch(`${API_URL}/tasks`);
      if (!res.ok) throw new Error();
      tasks = await res.json();
      render();
    } catch(e) {
      showToast('Backend connection failed', true);
    }
  }

  async function addTask() {
    const titleInput = document.getElementById('task-input');
    const title = titleInput.value.trim();
    const priority = document.getElementById('priority-select').value;
    const due_date = document.getElementById('due-date').value || null;

    if (!title) return showToast('Enter a task title', true);

    try {
      const res = await fetch(`${API_URL}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, priority, due_date })
      });
      if (res.ok) {
        titleInput.value = '';
        showToast('Task added!');
        fetchTasks();
      }
    } catch(e) { showToast('Error adding task', true); }
  }

  async function toggleTask(id, completed) {
    try {
      await fetch(`${API_URL}/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed: !completed })
      });
      fetchTasks();
    } catch(e) { showToast('Update failed', true); }
  }

  async function deleteTask(id) {
    if(!confirm('Delete this task?')) return;
    try {
      await fetch(`${API_URL}/tasks/${id}`, { method: 'DELETE' });
      showToast('Deleted');
      fetchTasks();
    } catch(e) { showToast('Delete failed', true); }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.color = isError ? '#ff6b8a' : '#4dd9ac';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function render() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty');
    
    if (tasks.length === 0) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    list.innerHTML = tasks.map(t => `
      <div class="glass rounded-xl p-4 flex items-center gap-4 task-${t.priority} animate-slideIn">
        <label>
          <input type="checkbox" class="custom-cb" ${t.completed ? 'checked' : ''} 
            onchange="toggleTask(${t.id}, ${t.completed})">
          <div class="cb-box">
            <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="3"><path d="M2 6l3 3 5-5"/></svg>
          </div>
        </label>
        <div class="flex-1">
          <p class="${t.completed ? 'line-through text-white/30' : 'text-white'} font-medium">${t.title}</p>
          <div class="flex gap-3 text-[10px] mt-1 uppercase tracking-widest font-bold">
            <span class="text-accent">${t.priority}</span>
            ${t.due_date ? `<span class="text-white/20">📅 ${new Date(t.due_date).toLocaleDateString()}</span>` : ''}
          </div>
        </div>
        <button onclick="deleteTask(${t.id})" class="text-white/20 hover:text-red-400 transition-colors">🗑</button>
      </div>
    `).join('');
  }

  // Initial load
  fetchTasks();
</script>
</body>
</html>
